<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" fill="none">
  <defs>
    <!-- Grunge texture via feTurbulence -->
    <filter id="grunge" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend mode="multiply" in="SourceGraphic" in2="gray"/>
    </filter>
    <!-- Soft edge blur -->
    <filter id="softedge">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- Inner shadow -->
    <radialGradient id="cranGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2a0808"/>
      <stop offset="60%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#0a0202"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d0a0a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>

  <g filter="url(#grunge)" opacity="0.9">
    <!-- Cranium main shape -->
    <ellipse cx="400" cy="340" rx="230" ry="260" fill="url(#cranGrad)"/>

    <!-- Cranium highlight ridge -->
    <ellipse cx="400" cy="260" rx="190" ry="100" fill="#1f0606" opacity="0.5"/>

    <!-- Forehead contour -->
    <ellipse cx="400" cy="200" rx="170" ry="80" fill="#180505" opacity="0.4"/>

    <!-- Brow ridge -->
    <path d="M220 340 Q300 290 400 300 Q500 290 580 340" stroke="#2a0808" stroke-width="18" fill="none" stroke-linecap="round"/>

    <!-- Left eye socket -->
    <ellipse cx="320" cy="370" rx="62" ry="68" fill="#000"/>
    <ellipse cx="320" cy="370" rx="50" ry="55" fill="url(#eyeGlow)"/>
    <!-- Eye socket rim -->
    <ellipse cx="320" cy="370" rx="60" ry="66" stroke="#1a0404" stroke-width="6" fill="none"/>

    <!-- Right eye socket -->
    <ellipse cx="480" cy="370" rx="62" ry="68" fill="#000"/>
    <ellipse cx="480" cy="370" rx="50" ry="55" fill="url(#eyeGlow)"/>
    <ellipse cx="480" cy="370" rx="60" ry="66" stroke="#1a0404" stroke-width="6" fill="none"/>

    <!-- Nose bridge -->
    <path d="M375 330 L400 310 L425 330" stroke="#1a0505" stroke-width="4" fill="none"/>

    <!-- Nasal cavity -->
    <path d="M400 400 L370 470 Q400 455 430 470 Z" fill="#000"/>
    <path d="M400 410 L378 460 Q400 448 422 460 Z" fill="#150303" opacity="0.5"/>
    <!-- Nasal septum -->
    <line x1="400" y1="415" x2="400" y2="455" stroke="#0a0202" stroke-width="3"/>

    <!-- Cheekbone left -->
    <ellipse cx="240" cy="430" rx="50" ry="80" fill="#140404" opacity="0.6"/>
    <path d="M200 380 Q240 420 260 500" stroke="#1a0505" stroke-width="5" fill="none" opacity="0.4"/>

    <!-- Cheekbone right -->
    <ellipse cx="560" cy="430" rx="50" ry="80" fill="#140404" opacity="0.6"/>
    <path d="M600 380 Q560 420 540 500" stroke="#1a0505" stroke-width="5" fill="none" opacity="0.4"/>

    <!-- Zygomatic arch left -->
    <path d="M195 370 Q170 390 180 430 Q190 460 220 470" stroke="#1a0505" stroke-width="8" fill="none" opacity="0.5"/>

    <!-- Zygomatic arch right -->
    <path d="M605 370 Q630 390 620 430 Q610 460 580 470" stroke="#1a0505" stroke-width="8" fill="none" opacity="0.5"/>

    <!-- Upper jaw / maxilla -->
    <path d="M260 510 Q280 540 400 555 Q520 540 540 510 L540 530 Q520 570 400 580 Q280 570 260 530 Z" fill="#120303"/>

    <!-- Lower jaw hint -->
    <path d="M270 540 Q300 600 400 620 Q500 600 530 540" stroke="#160404" stroke-width="6" fill="none" opacity="0.6"/>
    <path d="M280 555 Q310 610 400 630 Q490 610 520 555" stroke="#100303" stroke-width="4" fill="none" opacity="0.4"/>

    <!-- Teeth row -->
    <g stroke="#0a0202" stroke-width="3" opacity="0.7">
      <line x1="310" y1="515" x2="310" y2="555"/>
      <line x1="330" y1="518" x2="330" y2="562"/>
      <line x1="350" y1="520" x2="350" y2="568"/>
      <line x1="370" y1="521" x2="370" y2="572"/>
      <line x1="390" y1="522" x2="390" y2="574"/>
      <line x1="410" y1="522" x2="410" y2="574"/>
      <line x1="430" y1="521" x2="430" y2="572"/>
      <line x1="450" y1="520" x2="450" y2="568"/>
      <line x1="470" y1="518" x2="470" y2="562"/>
      <line x1="490" y1="515" x2="490" y2="555"/>
    </g>

    <!-- Teeth highlight -->
    <g stroke="#1a0606" stroke-width="1.5" opacity="0.3">
      <line x1="320" y1="516" x2="320" y2="558"/>
      <line x1="340" y1="519" x2="340" y2="565"/>
      <line x1="360" y1="520" x2="360" y2="570"/>
      <line x1="380" y1="522" x2="380" y2="573"/>
      <line x1="400" y1="522" x2="400" y2="574"/>
      <line x1="420" y1="522" x2="420" y2="573"/>
      <line x1="440" y1="520" x2="440" y2="570"/>
      <line x1="460" y1="519" x2="460" y2="565"/>
      <line x1="480" y1="516" x2="480" y2="558"/>
    </g>

    <!-- Temple depressions -->
    <ellipse cx="200" cy="320" rx="35" ry="50" fill="#0a0202" opacity="0.4"/>
    <ellipse cx="600" cy="320" rx="35" ry="50" fill="#0a0202" opacity="0.4"/>

    <!-- Cranium suture lines -->
    <path d="M400 100 Q410 180 400 250 Q390 300 400 340" stroke="#1a0505" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M300 180 Q350 200 400 190 Q450 200 500 180" stroke="#1a0505" stroke-width="2" fill="none" opacity="0.25"/>
    <path d="M250 280 Q300 300 350 290" stroke="#1a0505" stroke-width="1.5" fill="none" opacity="0.2"/>
    <path d="M550 280 Q500 300 450 290" stroke="#1a0505" stroke-width="1.5" fill="none" opacity="0.2"/>
  </g>

  <!-- Atmospheric outer glow -->
  <ellipse cx="400" cy="400" rx="350" ry="400" fill="none" stroke="#1a0404" stroke-width="40" opacity="0.08" filter="url(#softedge)"/>
</svg>
