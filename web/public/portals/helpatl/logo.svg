<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <!-- Logomark: Civic "H" formed by two pillars with an arch bridge -->
  <g>
    <!-- Left pillar -->
    <rect x="4" y="8" width="6" height="32" rx="2" fill="#0D6E6E"/>
    <!-- Right pillar -->
    <rect x="26" y="8" width="6" height="32" rx="2" fill="#0D6E6E"/>
    <!-- Arch crossbar connecting the pillars — civic bridge motif -->
    <path d="M10 22 C10 16, 18 12, 18 12 C18 12, 26 16, 26 22" stroke="#0D6E6E" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Base platform -->
    <rect x="2" y="38" width="32" height="3" rx="1.5" fill="#0D6E6E" opacity="0.35"/>
  </g>
  <!-- Wordmark: "HelpATL" -->
  <text x="46" y="34" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5" fill="#1A1A1F">
    <tspan fill="#0D6E6E">Help</tspan><tspan fill="#1A1A1F">ATL</tspan>
  </text>
</svg>
