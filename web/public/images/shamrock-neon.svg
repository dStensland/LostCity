    <line x1="64" y1="28" x2="64" y2="56" stroke="#4ade80" stroke-width="1.2" opacity="0.6"/>
    <line x1="36" y1="62" x2="56" y2="64" stroke="#4ade80" stroke-width="1.2" opacity="0.6"/>
    <line x1="92" y1="62" x2="72" y2="64" stroke="#4ade80" stroke-width="1.2" opacity="0.6"/>
    <!-- Stem -->
    <path d="M64 62 C62 76, 56 92, 50 112"
          fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <path d="M64 62 C62 76, 56 92, 50 112"
          fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
