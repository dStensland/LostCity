          fill="#22c55e" fill-opacity="0.85" stroke="#4ade80" stroke-width="1.5"/>
    <!-- Right leaf -->
    <path d="M76 50 C90 42, 106 46, 108 60 C110 72, 100 82, 88 82 C78 82, 70 74, 68 64 C72 60, 76 54, 76 50Z"
          fill="#22c55e" fill-opacity="0.85" stroke="#4ade80" stroke-width="1.5"/>
