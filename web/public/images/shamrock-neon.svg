<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Top leaf -->
    <path d="M64 16 C50 16, 38 28, 42 42 C44 50, 54 58, 64 60 C74 58, 84 50, 86 42 C90 28, 78 16, 64 16Z"
          fill="#22c55e" fill-opacity="0.85" stroke="#4ade80" stroke-width="1.5"/>
