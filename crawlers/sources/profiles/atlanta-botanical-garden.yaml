version: 1
slug: atlanta-botanical-garden
name: Atlanta Botanical Garden
integration_method: api
defaults: {}
discovery:
  enabled: true
  type: api
  api:
    adapter: custom
  urls:
  - https://atlantabg.org/wp-json/tribe/events/v1/events
  fetch:
    render_js: false
    timeout_ms: 60000
    wait_until: load
detail:
  enabled: false
data_goals:
- events
- exhibits
- images
- tickets
