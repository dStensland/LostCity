name: Apply Supabase Migrations

# Auto-applies any pending migrations in supabase/migrations/ to production
# whenever a new migration file is added on main. Also supports manual trigger
# (workflow_dispatch) for replays / staging applies.
#
# Required secret: SUPABASE_DATABASE_URL — production Postgres connection string
# (postgres://...). Add via repo Settings → Secrets and variables → Actions.

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**.sql"
  workflow_dispatch:
    inputs:
      target:
        description: "Database target"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      dry_run:
        description: "Dry-run only (no SQL executed)"
        required: false
        default: false
        type: boolean

concurrency:
  group: migration-apply-${{ github.event.inputs.target || 'production' }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psycopg2-binary python-dotenv

      - name: Apply pending migrations
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          STAGING_DATABASE_URL: ${{ secrets.SUPABASE_STAGING_DATABASE_URL }}
        run: |
          python3 database/apply_targeted_migrations.py \
            --target ${{ github.event.inputs.target || 'production' }} \
            --all-pending \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
