name: Crawler Quality

on:
  pull_request:
    paths:
      - "crawlers/**"
      - ".github/workflows/crawler-quality.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "crawlers/**"
      - ".github/workflows/crawler-quality.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: crawlers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Run pytest
        env:
          # Dummy values to satisfy the credential gate in db/client.py.
          # Tests mock the supabase client, so they don't actually need
          # a real connection — but the module-level credential check
          # must pass at import time for the tests to load.
          SUPABASE_URL: https://stub.supabase.co
          SUPABASE_SERVICE_KEY: stub-service-key
          SUPABASE_ANON_KEY: stub-anon-key
        run: python -m pytest --tb=short
