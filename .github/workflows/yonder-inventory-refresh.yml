name: Yonder Inventory Refresh

on:
  schedule:
    # Run daily at 11:10 UTC, matching Yonder's configured inventory cadence.
    - cron: "10 11 * * *"
  workflow_dispatch:
    inputs:
      skip_prune:
        description: "Skip retention prune after sync"
        required: false
        default: "false"
      keep_per_window:
        description: "Retention count per venue/provider/arrival window"
        required: false
        default: "2"
      freshness_max_age_days:
        description: "Maximum allowed age in days for current snapshots"
        required: false
        default: "1"

jobs:
  yonder-inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crawlers/requirements.txt

      - name: Install crawler dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Yonder inventory cycle
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ARGS="--apply --keep-per-window ${{ github.event.inputs.keep_per_window || '2' }} --freshness-max-age-days ${{ github.event.inputs.freshness_max_age_days || '1' }}"

          if [ "${{ github.event.inputs.skip_prune || 'false' }}" = "true" ]; then
            ARGS="$ARGS --skip-prune"
          fi

          echo "Running: python3 scripts/run_yonder_inventory_cycle.py $ARGS"
          python3 scripts/run_yonder_inventory_cycle.py $ARGS

      - name: Publish summary
        if: always()
        working-directory: crawlers
        run: |
          echo "## Yonder Inventory Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Triggered at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skip prune: \`${{ github.event.inputs.skip_prune || 'false' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Keep per window: \`${{ github.event.inputs.keep_per_window || '2' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Freshness max age days: \`${{ github.event.inputs.freshness_max_age_days || '1' }}\`" >> "$GITHUB_STEP_SUMMARY"
