name: Network Feed Crawl

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Specific network source slug (leave empty for all active sources)'
        required: false
        default: ''
      limit:
        description: 'Max posts to fetch per source'
        required: false
        default: '20'

jobs:
  network-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawlers/requirements.txt

      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config file
        working-directory: crawlers
        run: |
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      - name: Run network feed crawl
        working-directory: crawlers
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then
            LIMIT="20"
          fi

          if [ -n "${{ github.event.inputs.source }}" ]; then
            echo "Running network feeds for source: ${{ github.event.inputs.source }} (limit=$LIMIT)"
            python scrape_network_feeds.py --source "${{ github.event.inputs.source }}" --limit "$LIMIT"
          else
            echo "Running network feeds for all active sources (limit=$LIMIT)"
            python scrape_network_feeds.py --limit "$LIMIT"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Network Feed Crawl Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Completed at: $(date)" >> $GITHUB_STEP_SUMMARY
